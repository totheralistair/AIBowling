name: Run Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app:
          - AppForCheckin
          - AppForLanesManager
          - AppForLaneGovernor
          - AppForBowlersAtLane

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (${{ matrix.app }})
        run: npm install
        working-directory: ${{ matrix.app }}

      - name: Run tests (${{ matrix.app }})
        run: npm test
        working-directory: ${{ matrix.app }}
