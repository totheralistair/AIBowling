<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bowling System Diagram</title>
<style>
  body { font-family: monospace; background: #f9f9f9; display: flex; justify-content: center; padding: 40px; }
  svg { background: white; border: 1px solid #ddd; }
  .label { font-size: 12px; font-family: monospace; }
  .sublabel { font-size: 10px; font-family: monospace; fill: #666; }
  .box { rx: 4; ry: 4; }
  .external { fill: #e8e8e8; stroke: #999; }
  .central { fill: #d0e8ff; stroke: #4488cc; }
  .governor { fill: #d4f0d4; stroke: #44aa44; }
  .tablet { fill: #fff4cc; stroke: #ccaa00; }
  .hardware { fill: #f0d4d4; stroke: #aa4444; }
  .app { fill: #eeddff; stroke: #8844cc; }
  line, path { stroke-width: 1.5; }
  .arrow { marker-end: url(#arrowhead); }
  .dashed { stroke-dasharray: 5,4; }
</style>
</head>
<body>
<svg width="820" height="560" viewBox="0 0 820 560">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="15" font-family="monospace" font-weight="bold">Bowling System — Component Overview</text>

  <!-- POS System (external) -->
  <rect x="30" y="60" width="140" height="50" class="box external" stroke="#999" fill="#e8e8e8"/>
  <text x="100" y="81" text-anchor="middle" class="label" font-weight="bold">POS System</text>
  <text x="100" y="97" text-anchor="middle" class="sublabel">(external)</text>

  <!-- Central Computer -->
  <rect x="300" y="55" width="220" height="60" class="box central" stroke="#4488cc" fill="#d0e8ff"/>
  <text x="410" y="79" text-anchor="middle" class="label" font-weight="bold">Central Computer</text>
  <text x="410" y="96" text-anchor="middle" class="sublabel">check-in/out · lane on/off · POS bridge</text>

  <!-- Front Desk App -->
  <rect x="300" y="160" width="220" height="55" class="box app" stroke="#8844cc" fill="#eeddff"/>
  <text x="410" y="182" text-anchor="middle" class="label" font-weight="bold">Front Desk App</text>
  <text x="410" y="198" text-anchor="middle" class="sublabel">users: cashier, front desk staff</text>

  <!-- Arrow: Front Desk App <-> Central Computer -->
  <line x1="410" y1="160" x2="410" y2="115" stroke="#555" class="arrow"/>
  <line x1="410" y1="115" x2="410" y2="160" stroke="#555" marker-start="url(#arrowhead)" stroke-dasharray="none"/>

  <!-- Arrow: Central Computer <-> POS -->
  <line x1="300" y1="80" x2="170" y2="80" stroke="#555" class="arrow dashed"/>

  <!-- Lane Pair repeat group — left (Lane Pair 1) -->
  <!-- Governor 1 -->
  <rect x="100" y="300" width="180" height="55" class="box governor" stroke="#44aa44" fill="#d4f0d4"/>
  <text x="190" y="322" text-anchor="middle" class="label" font-weight="bold">Lane Governor</text>
  <text x="190" y="338" text-anchor="middle" class="sublabel">lane pair 1 · local service</text>

  <!-- Tablet 1 -->
  <rect x="30" y="410" width="150" height="55" class="box tablet" stroke="#ccaa00" fill="#fff4cc"/>
  <text x="105" y="432" text-anchor="middle" class="label" font-weight="bold">Lane Tablet App</text>
  <text x="105" y="448" text-anchor="middle" class="sublabel">bowler · attendant</text>

  <!-- Pinsetter 1 -->
  <rect x="210" y="410" width="130" height="55" class="box hardware" stroke="#aa4444" fill="#f0d4d4"/>
  <text x="275" y="432" text-anchor="middle" class="label" font-weight="bold">Pinsetter</text>
  <text x="275" y="448" text-anchor="middle" class="sublabel">hardware · lanes 1–2</text>

  <!-- Arrow: Central -> Governor 1 -->
  <line x1="350" y1="115" x2="220" y2="300" stroke="#555" class="arrow"/>

  <!-- Arrow: Governor 1 <-> Tablet 1 -->
  <line x1="150" y1="355" x2="120" y2="410" stroke="#555" class="arrow"/>
  <line x1="120" y1="410" x2="150" y2="355" stroke="#555" marker-start="url(#arrowhead)"/>

  <!-- Arrow: Governor 1 -> Pinsetter 1 -->
  <line x1="240" y1="355" x2="265" y2="410" stroke="#555" class="arrow"/>

  <!-- Lane pair 1 bracket -->
  <rect x="20" y="285" width="310" height="200" rx="6" ry="6" fill="none" stroke="#44aa44" stroke-dasharray="6,4" stroke-width="1"/>
  <text x="28" y="280" class="sublabel" fill="#44aa44">Lane Pair 1</text>

  <!-- Lane Pair 2 (right, abbreviated to show repeatability) -->
  <rect x="530" y="300" width="180" height="55" class="box governor" stroke="#44aa44" fill="#d4f0d4"/>
  <text x="620" y="322" text-anchor="middle" class="label" font-weight="bold">Lane Governor</text>
  <text x="620" y="338" text-anchor="middle" class="sublabel">lane pair N · local service</text>

  <rect x="460" y="410" width="150" height="55" class="box tablet" stroke="#ccaa00" fill="#fff4cc"/>
  <text x="535" y="432" text-anchor="middle" class="label" font-weight="bold">Lane Tablet App</text>
  <text x="535" y="448" text-anchor="middle" class="sublabel">bowler · attendant</text>

  <rect x="640" y="410" width="130" height="55" class="box hardware" stroke="#aa4444" fill="#f0d4d4"/>
  <text x="705" y="432" text-anchor="middle" class="label" font-weight="bold">Pinsetter</text>
  <text x="705" y="448" text-anchor="middle" class="sublabel">hardware · lanes N–N+1</text>

  <!-- Arrow: Central -> Governor 2 -->
  <line x1="470" y1="115" x2="590" y2="300" stroke="#555" class="arrow"/>

  <!-- Arrow: Governor 2 <-> Tablet 2 -->
  <line x1="580" y1="355" x2="550" y2="410" stroke="#555" class="arrow"/>
  <line x1="550" y1="410" x2="580" y2="355" stroke="#555" marker-start="url(#arrowhead)"/>

  <!-- Arrow: Governor 2 -> Pinsetter 2 -->
  <line x1="660" y1="355" x2="690" y2="410" stroke="#555" class="arrow"/>

  <!-- Lane pair N bracket -->
  <rect x="450" y="285" width="320" height="200" rx="6" ry="6" fill="none" stroke="#44aa44" stroke-dasharray="6,4" stroke-width="1"/>
  <text x="458" y="280" class="sublabel" fill="#44aa44">Lane Pair N</text>

  <!-- Ellipsis between lane pairs -->
  <text x="400" y="390" text-anchor="middle" font-size="22" fill="#aaa">· · ·</text>

  <!-- Legend -->
  <rect x="30" y="510" width="14" height="14" fill="#d0e8ff" stroke="#4488cc"/>
  <text x="50" y="522" class="sublabel">Central infrastructure</text>
  <rect x="170" y="510" width="14" height="14" fill="#eeddff" stroke="#8844cc"/>
  <text x="190" y="522" class="sublabel">App (human-facing)</text>
  <rect x="310" y="510" width="14" height="14" fill="#d4f0d4" stroke="#44aa44"/>
  <text x="330" y="522" class="sublabel">Lane governor (service)</text>
  <rect x="480" y="510" width="14" height="14" fill="#fff4cc" stroke="#ccaa00"/>
  <text x="500" y="522" class="sublabel">Tablet app</text>
  <rect x="580" y="510" width="14" height="14" fill="#f0d4d4" stroke="#aa4444"/>
  <text x="600" y="522" class="sublabel">Hardware</text>
  <rect x="670" y="510" width="14" height="14" fill="#e8e8e8" stroke="#999"/>
  <text x="690" y="522" class="sublabel">External</text>
</svg>
</body>
</html>
